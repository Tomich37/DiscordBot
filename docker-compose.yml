version: '3.8'

services:
  emilia-db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - discord_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  emilia-bot:
    build: .
    environment:
      DISCORD_TOKEN: ${DISCORD_MAIN_TOKEN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@emilia-db:5432/${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ALCHEMY_MODEL: ${ALCHEMY_MODEL:-gpt-5-nano}
      ALCHEMY_START_BALANCE: ${ALCHEMY_START_BALANCE:-50}
      ALCHEMY_DAILY_REWARD: ${ALCHEMY_DAILY_REWARD:-25}
      ALCHEMY_COMBINE_COST: ${ALCHEMY_COMBINE_COST:-5}
      LOGS_DIR: /app/app/modules/logs
      DEBUG_LOGS: ${DEBUG_LOGS:-false}
    volumes:
      - ./logs:/app/app/modules/logs
    depends_on:
      emilia-db:
        condition: service_healthy
    networks:
      - discord_network
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  pg_data:

networks:
  discord_network:
